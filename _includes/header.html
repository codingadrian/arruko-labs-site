<header class="site-header">
  <div class="container">
    <a class="logo" href="{{ site.baseurl }}/{{ page.lang }}/">
      <!-- Replace: swap img src with your logo file e.g. /assets/images/logo.svg -->
      <img src="{{ site.baseurl }}/assets/images/arrukolabslogo.svg" alt="Arruko Labs" class="logo-img" />
    </a>

    <nav class="site-nav" id="site-nav">
      {% if page.lang == 'es' %}
        <a href="{{ site.baseurl }}/es/servicios/">Servicios</a>
        <a href="{{ site.baseurl }}/es/blog/">Blog</a>
        <a href="{{ site.baseurl }}/es/sobre/">Nosotros</a>
        <a href="{{ site.baseurl }}/es/contacto/" class="cta-link">Agendar llamada</a>
        <a href="{{ site.baseurl }}/en/" class="lang-switch">EN</a>
      {% else %}
        <a href="{{ site.baseurl }}/en/services/">Services</a>
        <a href="{{ site.baseurl }}/en/blog/">Blog</a>
        <a href="{{ site.baseurl }}/en/about/">About</a>
        <a href="{{ site.baseurl }}/en/contact/" class="cta-link">Book a call</a>
        <a href="{{ site.baseurl }}/es/" class="lang-switch">ES</a>
      {% endif %}
    </nav>

    <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</header>
