---
layout: default
---
<article class="post">
  <div class="container">
    <header class="post-header">
      <h1 class="post-title">{{ page.title }}</h1>
      <p class="post-meta">{{ page.date | date: "%B %d, %Y" }}</p>
    </header>
    <div class="post-content">
      {{ content }}
    </div>
    <div class="post-footer">
      {% if page.lang == 'es' %}
        <a href="/es/blog/" class="back-link">← Volver al blog</a>
      {% else %}
        <a href="/en/blog/" class="back-link">← Back to blog</a>
      {% endif %}
    </div>
  </div>
</article>
